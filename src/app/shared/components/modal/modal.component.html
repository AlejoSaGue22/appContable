@if (visible()) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in">
 <div class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm" (click)="closable() && close()"></div>
 <div class="relative transform rounded-2xl bg-white shadow-modal w-full animate-scale-in overflow-hidden"
 [class]="sizeClass[size()]">
 @if (title()) {
 <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100">
 <h3 class="text-lg font-bold text-gray-900 leading-6" id="modal-title">
 {{ title() }}
 </h3>
 @if (closable()) {
 <button (click)="close()" type="button"
 class="text-gray-400 hover:text-gray-600 hover:bg-gray-50 rounded-xl p-2 transition-all cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500/20">
 <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
 <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
 </svg>
 </button>
 }
 </div>
 }
 <div class="px-6 py-5 max-h-[70vh] overflow-y-auto">
 <ng-content></ng-content>
 </div>
 </div>
</div>
}
