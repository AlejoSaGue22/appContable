<div class="flex flex-col sm:flex-row items-center justify-between gap-4 px-4 py-3">
 <div class="text-sm text-slate-500 order-2 sm:order-1">
 Mostrando <span class="font-bold text-slate-700">{{ length() || 0 }}</span> de
 <span class="font-bold text-slate-700">{{ paginationService.totalItems() || length() }}</span> registros
 </div>
 <div class="flex items-center gap-1 order-1 sm:order-2">
 <button class="px-3 py-1.5 min-w-9 min-h-9 text-sm font-medium text-slate-500 bg-white border border-slate-200 rounded-xl
 hover:bg-slate-50 hover:border-slate-300 transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed cursor-pointer"
 [disabled]="selectPage() <= 1"
 [routerLink]="[]"
 [queryParams]="{ page: selectPage() - 1 }">
 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
 <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
 </svg>
 </button>

 @for (page of getPagesList(); track $index) {
 <button class="min-w-9 h-9 text-sm font-bold rounded-xl transition-all duration-200 cursor-pointer"
 [class.bg-blue-600]="page == selectPage()"
 [class.text-white]="page == selectPage()"
 [class.shadow-md]="page == selectPage()"
 [class.text-slate-500]="page != selectPage()"
 [class.hover:bg-slate-100]="page != selectPage()"
 [class.border]="page != selectPage()"
 [class.border-slate-200]="page != selectPage()"
 [routerLink]="[]"
 [queryParams]="{ page: page }">
 {{ page }}
 </button>
 }

 <button class="px-3 py-1.5 min-w-9 min-h-9 text-sm font-medium text-slate-500 bg-white border border-slate-200 rounded-xl
 hover:bg-slate-50 hover:border-slate-300 transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed cursor-pointer"
 [disabled]="selectPage() >= pages()"
 [routerLink]="[]"
 [queryParams]="{ page: selectPage() + 1 }">
 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
 <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
 </svg>
 </button>
 </div>
</div>
