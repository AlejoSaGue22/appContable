<div class="p-6 space-y-6 animate-fade-in">
    <header-title-page [titleHead]="{ title, slog }">
    </header-title-page>

    <!-- Breadcrumb -->
    <nav class="flex items-center gap-2 text-sm text-slate-400">
        <a routerLink="/panel/nomina/empleados" class="hover:text-slate-600 transition-colors">Empleados</a>
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
        <span class="text-slate-800 font-medium">{{ isEditing() ? 'Editar' : 'Nuevo' }}</span>
    </nav>

    @if (loading()) {
        <div class="flex justify-center py-16">
            <svg class="animate-spin h-10 w-10 text-blue-600" viewBox="0 0 24 24" fill="none">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
        </div>
    } @else {
        <div class="max-w-4xl mx-auto">
            <app-empleado-wizard [empleado]="empleado()" (saved)="onSaved($event)" (cancelled)="onCancelled()" />
        </div>
    }
</div>
