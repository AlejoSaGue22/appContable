<div class="p-4 sm:p-6 lg:p-8 space-y-6 animate-fade-in">
 <header-title-page [titleHead]="headTitle">
 <button actions routerLink="/panel/compras/notas-ajuste/new-Item" 
 class="inline-flex items-center justify-center px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-xl transition-all shadow-lg active:scale-95 group cursor-pointer">
 <svg class="mr-2 h-4 w-4 transition-transform group-hover:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
 </svg>
 Nueva Nota
 </button>
 </header-title-page>

 <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
 <div class="p-6">
 @if (notasResource.isLoading()) {
 <div class="py-12 flex justify-center items-center">
 <app-loader />
 </div>
 } @else if (notasResource.error()) {
 <div class="py-8">
 <app-error-pages />
 </div>
 } @else {
 <app-table-notas-compras
 [notas]="notasResource.value()?.data || []"
 (filterChange)="onFilterChange($event)"
 (pageChange)="onPageChange($event)"
 (delete)="confirmDelete($event)"
 (registrarBorrador)="onRegistrarBorrador($event)"
 (reintentarAsiento)="onReintentarAsiento($event)">
 </app-table-notas-compras>
 }
 </div>
 </div>
</div>

<app-modal [(visible)]="isDeleteModalVisible">
 <div class="p-6 text-center">
 <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
 <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
 </svg>
 </div>
 <h3 class="text-xl font-bold text-gray-900 mb-2">¿Eliminar borrador?</h3>
 <p class="text-sm text-gray-500 mb-8 max-w-xs mx-auto">
 Esta acción no se puede deshacer. ¿Estás seguro de que deseas eliminar este borrador de nota de crédito?
 </p>
 <div class="flex flex-col sm:flex-row gap-3 justify-center">
 <button (click)="isDeleteModalVisible.set(false)" 
 class="flex-1 px-6 py-3 border border-gray-100 text-sm font-bold text-gray-500 rounded-xl hover:bg-gray-50 transition-all cursor-pointer">
 Cancelar
 </button>
 <button (click)="onDelete()" 
 class="flex-1 px-6 py-3 bg-red-600 text-white text-sm font-bold rounded-xl hover:bg-red-700 shadow-lg shadow-red-200 transition-all active:scale-95 cursor-pointer">
 Eliminar
 </button>
 </div>
 </div>
</app-modal>
