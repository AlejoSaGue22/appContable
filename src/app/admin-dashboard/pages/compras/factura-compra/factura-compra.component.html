<div class="space-y-6 animate-fade-in">
  @if ( facturasCompraResource.isLoading() ) {
    <div class="flex flex-col justify-center items-center h-80 space-y-4">
        <app-loader />
        <p class="text-sm text-gray-400 animate-pulse">Consultando registro de compras...</p>
    </div>
  }

  @if (facturasCompraResource.hasValue() ) {
    <header-title-page [titleHead]="headTitle" />

    <!-- Table and Filters Modernized -->
    <app-table-compras 
        [compraData]="facturasCompraResource.value().data" 
        [activeFilters]="filters()"
        [currentPage]="currentPage()"
        [totalPages]="totalPages()" 
        [totalItems]="totalItems()" 
        [pageSize]="pageSize()"
        (filterChange)="onFilterChange($event)" 
        (anular)="openModalItem($event, 'anular')"
        (pageChange)="onPageChange($event)"  />
  }

  @if (facturasCompraResource.error()) {
    <app-error-pages />
  }

  <!-- Modal Modernized -->
  <app-modal [(visible)]="isModalItem">
    <div class="p-6 text-center">
        <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        <h3 class="text-xl font-semibold text-gray-900 mb-2">¿Confirmar acción?</h3>
        <p class="text-sm text-gray-500 mb-8 max-w-xs mx-auto">Estas seguro de <strong>{{ action() === 'anular' ? 'anular' : 'eliminar' }}</strong> este comprobante de compra?</p>

        <div class="flex flex-col sm:flex-row gap-3">
            <button (click)="isModalItem.set(false)" 
                class="flex-1 px-6 py-3 border border-gray-100 text-sm font-semibold text-gray-500 rounded-xl hover:bg-gray-50 transition-all">
                Cancelar
            </button>
            <button (click)="onAction()" 
                class="flex-1 px-6 py-3 bg-red-600 text-white text-sm font-semibold rounded-xl hover:bg-red-700 shadow-lg shadow-red-200 transition-all active:scale-95">
                Confirmar
            </button>
        </div>
    </div>
  </app-modal>
</div>

<style>
  .animate-fade-in {
    animation: fadeIn 0.4s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
