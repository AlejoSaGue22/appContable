<div class="mb-8">
    <div class="flex items-center gap-2 mb-6 ml-1">
      <span class="w-1 h-5 bg-indigo-600 rounded-full"></span>
      <h2 class="text-xl font-bold text-gray-800">Accesos Rápidos</h2>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (item of accesoRapido(); track $index) {
      <div
        class="group relative bg-[#1e293b] p-6 rounded-2xl overflow-hidden cursor-pointer transition-all duration-300 hover:scale-[1.02] hover:shadow-2xl shadow-indigo-500/20"
        [routerLink]="item.ruta">

        <div
          class="absolute -right-6 -bottom-6 w-32 h-32 bg-white/5 rounded-full group-hover:scale-150 transition-transform duration-700">
        </div>

        <div class="relative z-10">
          <h3 class="text-white text-lg font-bold mb-1">{{ item.title }}</h3>
          <p class="text-gray-400 text-xs font-medium">Acceder al módulo directamente</p>
        </div>

        <div class="mt-8 flex justify-between items-center relative z-10">
          <div
            class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center group-hover:bg-indigo-500 transition-colors duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
          </div>
          <svg xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6 text-white opacity-0 group-hover:opacity-100 -translate-x-4 group-hover:translate-x-0 transition-all duration-300"
            fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
          </svg>
        </div>
      </div>
      }
    </div>
  </div>
