<div
 class="bg-white p-7 rounded-2xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] border border-gray-100 h-[400px] flex flex-col">
 <div class="flex items-center justify-between mb-8">
 <div>
 <h2 class="text-lg font-bold text-gray-800">Transacciones Recientes</h2>
 <p class="text-xs text-gray-400 font-medium">Últimos movimientos registrados</p>
 </div>
 <!-- <button
 class="text-[11px] font-bold text-indigo-600 hover:text-indigo-800 uppercase px-3
 py-1.5 bg-indigo-50 rounded-lg transition-colors">
 Ver todo
 </button> -->
 </div>

 <div class="flex-1 overflow-y-auto">
 <table class="ledger-table">
 <tbody>
 @for (tx of recentTransactions(); track tx.id) {
 <tr class="border-b border-gray-50 last:border-0">
 <td>
 <div class="flex flex-col">
 <span class="text-xs font-bold text-gray-700">{{ tx.entidad }}</span>
 <span class="text-[10px] font-medium text-gray-400 uppercase">{{ tx.fecha | date:'dd MMM, yyyy'
 }}</span>
 </div>
 </td>
 <td>
 <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide"
 [class.bg-emerald-50]="tx.type === 'venta'" [class.text-emerald-700]="tx.type === 'venta'"
 [class.bg-rose-50]="tx.type === 'compra'" [class.text-rose-700]="tx.type === 'compra'">
 {{ tx.type }}
 </span>
 </td>
 <td class="text-right">
 <span [class.text-emerald-600]="tx.type === 'venta'"
 [class.text-gray-800]="tx.type === 'compra'">
 {{ tx.type === 'venta' ? '+' : '-' }} {{ tx.total | currency }}
 </span>
 </td>
 </tr>
 }
 @empty {
 <tr>
 <td colspan="7">
 <app-empty-state
 title="No se ha registrado ningún movimiento"
 description="Se observará la transacción al momento de registrar una factura."
 />
 </td>
 </tr>
 }
 </tbody>
 </table>
 </div>
 </div>
