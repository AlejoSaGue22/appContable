@if (notasResource.isLoading()) {
    <div class="flex justify-center items-center h-screen">
        <app-loader />
    </div>
}

@if (notasResource.hasValue()) {
    <div class="p-4 sm:p-6 lg:p-8">
        <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
                <h1 class="text-2xl font-black text-gray-900 dark:text-white">{{ headTitle.title }}</h1>
                <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">{{ headTitle.slog }}</p>
            </div>
            <div class="flex items-center gap-3">
                <a routerLink="/panel/ventas/notas-ajuste/new" 
                    class="inline-flex items-center gap-2 rounded-xl bg-blue-600 px-5 py-2.5 text-sm font-bold text-white shadow-lg shadow-blue-200 transition-all hover:bg-blue-700 active:scale-95">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Nueva Nota
                </a>
            </div>
        </div>

        <app-table-notas 
            [notaData]="notasResource.value()!.data"
            [activeFilters]="filters()"
            [currentPage]="paginationService.currentPage()"
            [totalItems]="totalItems()"
            [totalPages]="totalPages()"
            (filterChange)="onFilterChange($event)"
            (pageChange)="onPageChange($event)"
            (emitir)="onEmitir($event)"
            (delete)="confirmDelete($event)"
            (downloadPDF)="onDownloadPDF($event)"
            (downloadXML)="onDownloadXML($event)"
        />
    </div>
}

@if (notasResource.error()) {
    <app-error-pages />
}

<app-modal [(visible)]="isDeleteModalVisible">
    <div class="p-6 text-center">
        <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </div>
        <h3 class="text-xl font-black text-gray-900 mb-2">¿Eliminar nota de ajuste?</h3>
        <p class="text-sm text-gray-500 mb-8 max-w-xs mx-auto">
            Esta acción marcará la nota como cancelada. ¿Deseas continuar?
        </p>

        <div class="flex flex-col sm:flex-row gap-3">
            <button (click)="isDeleteModalVisible.set(false)" 
                class="flex-1 px-6 py-3 border border-gray-100 text-sm font-bold text-gray-500 rounded-xl hover:bg-gray-50 transition-all cursor-pointer">
                Cancelar
            </button>
            <button (click)="onDelete()" 
                class="flex-1 px-6 py-3 bg-red-600 text-white text-sm font-bold rounded-xl hover:bg-red-700 shadow-lg shadow-red-200 transition-all active:scale-95 cursor-pointer">
                Confirmar
            </button>
        </div>
    </div>
</app-modal>
