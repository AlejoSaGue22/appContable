<header
  class="relative mb-8 overflow-hidden rounded-2xl bg-white dark:bg-gray-900 border border-gray-100 dark:border-gray-800 shadow-sm transition-all"
>
  <!-- Subtle decorative background gradient -->
  <div
    class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 rounded-full bg-blue-50 dark:bg-blue-900/10 blur-3xl opacity-50 pointer-events-none"
  ></div>

  <div
    class="relative flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between p-6 sm:p-8"
  >
    <div class="flex-1">
      <h1
        class="text-xl sm:text-4xl font-extrabold text-gray-900 dark:text-white tracking-tight"
      >
        Gestión de Facturas
      </h1>
      <p
        class="mt-2 text-base text-gray-500 dark:text-gray-400 max-w-2xl leading-relaxed"
      >
        Administra tus comprobantes de venta, realiza seguimiento de cobros y
        gestiona tus ingresos de forma centralizada.
      </p>
    </div>

    @if (canCreate()) {
      <div class="mt-4 sm:mt-0 shrink-0">
        <a
          routerLink="/panel/ventas/comprobantes/new-Item"
          class="group relative inline-flex items-center justify-center overflow-hidden rounded-xl bg-blue-600 px-6 py-3.5 text-sm font-semibold text-white transition-all duration-300 ease-out hover:bg-blue-700 hover:shadow-[0_8px_20px_-6px_rgba(37,99,235,0.4)] focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 w-full sm:w-auto"
        >
          <span
            class="absolute right-0 w-8 h-32 -mt-12 transition-all duration-1000 transform translate-x-12 bg-white opacity-10 rotate-12 group-hover:-translate-x-40 ease"
          ></span>
          <svg
            class="mr-2 h-5 w-5 transition-transform duration-300 group-hover:rotate-90 group-hover:scale-110"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v16m8-8H4"
            ></path>
          </svg>
          <span class="relative">Nueva Factura</span>
        </a>
      </div>
    }
  </div>
</header>
