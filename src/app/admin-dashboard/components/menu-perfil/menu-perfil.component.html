<div class="px-6 py-8 border-b border-white/5 bg-gradient-to-b from-white/5 to-transparent">
    <div class="flex flex-col items-center text-center group cursor-pointer" routerLink="/">
        <div class="relative mb-4">
            <div class="absolute inset-0 bg-blue-500 blur-xl opacity-20 group-hover:opacity-40 transition-opacity"></div>
            <img [src]="logoApp" [alt]="nameApp" class="relative w-16 h-16 rounded-2xl shadow-2xl transition-transform duration-500 group-hover:scale-105 group-hover:rotate-3">
        </div>
        <div class="space-y-1">
            <h1 class="text-xl font-black text-white tracking-tight">
                Admin<span class="text-blue-500">Panel</span>
            </h1>
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] opacity-60 group-hover:opacity-100 transition-opacity">
                {{ nameApp || 'Accounting System' }}
            </p>
        </div>
    </div>
</div>
