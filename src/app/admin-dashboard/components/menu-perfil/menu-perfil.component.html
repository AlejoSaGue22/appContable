<div class="px-2 py-2 border-b border-white/5 bg-gradient-to-b from-white/5 to-transparent">
    <div class="flex flex-col items-center text-center group cursor-pointer" routerLink="/panel/dashboard">
        <div class="relative mt-2">
            <div class="absolute inset-0 bg-blue-500 blur-xl opacity-20 group-hover:opacity-40 transition-opacity"></div>
            <img [src]="logoApp" [alt]="nameApp" class="relative w-16 h-16 rounded-2xl shadow-2xl transition-transform duration-500 group-hover:scale-105 group-hover:rotate-3">
        </div>
        <div class="m-2.5">
            <h1 class="text-xl font-bold text-white">
                AL<span class="text-blue-500">VA</span>
            </h1>
            <p class="text-xs font-bold text-gray-500 opacity-60 group-hover:opacity-100 transition-opacity">
                {{ sloganApp | titlecase }}
            </p>
        </div>
    </div>
</div>
