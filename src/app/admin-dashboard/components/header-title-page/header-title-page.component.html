<header class="bg-white/70 backdrop-blur-xl rounded-2xl mb-8 relative px-8 py-6 shadow-sm border border-white/20 flex flex-col md:flex-row md:items-center justify-between gap-4 group overflow-hidden animate-fade-in-down">
    <!-- Decorative side element -->
    <div class="absolute left-0 top-0 w-1.5 h-full bg-blue-600 rounded-full transition-all group-hover:bg-blue-500"></div>
    
    <div class="relative z-10 flex-1">
        <h1 class="text-3xl font-black text-gray-900 tracking-tight leading-tight transition-all group-hover:text-blue-600">{{titleHead().title}}</h1>
        <div class="flex items-center gap-2 mt-1 px-0.5">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">{{titleHead().slog}}</p>
        </div>
    </div>

    <!-- Actions Area -->
    <div class="relative z-10 flex items-center gap-3">
        <ng-content select="[actions]"></ng-content>
    </div>

    <!-- Subtle Background Detail -->
    <div class="absolute -right-12 -bottom-12 w-48 h-48 bg-blue-50/30 rounded-full blur-3xl -z-10 transition-all group-hover:scale-110 group-hover:bg-blue-100/40"></div>
</header>

<style>
    .animate-fade-in-down {
        animation: fadeInDown 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
