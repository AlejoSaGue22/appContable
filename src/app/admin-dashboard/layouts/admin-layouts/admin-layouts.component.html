
<div class="min-h-screen bg-gray-50 p-6 font-sans print:p-0">
    <div class="h-screen w-64 fixed left-0 top-0 bg-[#0f172a] shadow-md print:hidden">
        
        <app-menu-perfil/>

        <!-- Navigation -->
        <nav class="flex min-w-[240px] flex-col gap-1 p-2 font-sans text-base font-normal text-white">
            @for (option of menuItems(); track $index) {
                <app-barralateral-menu [title]="option.title" 
                    [subItems]="option.children ?? []" 
                    [menuSection]="option"
                    (menuToggled)="toggleActiveMenu($event)"
                    [activeMenu]="activeMenu" 
                    [menuId]="option.title"/>
            }

            <hr class="my-2 border-blue-gray-50" />
                <app-option-barralateral [menuItemsOther]="menuItemsOther()"/>
        </nav>
    </div>

    <div class="ml-64 mx-auto mt-0 print:ml-0 print:p-0">
       <router-outlet/>
    </div>
</div>
