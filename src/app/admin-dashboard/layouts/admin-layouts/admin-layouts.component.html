<div class="min-h-screen bg-gray-50/50 font-sans selection:bg-blue-100 selection:text-blue-900">
    
    <!-- Mobile Header -->
    <div class="lg:hidden flex items-center justify-between bg-[#0f172a] text-white px-3 py-2 sticky top-0 z-50 border-b 
                border-white/5 shadow-sm">
        <h1 class="text-xl font-black">Admin<span class="text-blue-500">Panel</span></h1>
        <button (click)="toggleMobileMenu()" class="p-2 rounded-lg hover:bg-white/10 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>
    </div>

    <!-- Mobile Sidebar Backdrop -->
    @if (isMobileMenuOpen()) {
        <div (click)="toggleMobileMenu()" class="lg:hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-40 animate-fade-in"></div>
    }

    <!-- Sidebar Navigation -->
    <aside [ngClass]="{
        'translate-x-0': isMobileMenuOpen(),
        '-translate-x-full lg:translate-x-0': !isMobileMenuOpen()
    }" class="fixed left-0 top-0 h-screen w-72 bg-[#0f172a] shadow-2xl z-50 transition-transform duration-300 ease-in-out flex flex-col overflow-hidden border-r border-white/5">
        
        <div class="flex-1 overflow-y-auto py-4 scrollbar-hide">
            <app-menu-perfil />

            <nav class="px-4 mt-6 space-y-1">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest px-4 mb-4 opacity-50">Menú Principal</p>
                
                @for (option of menuItems(); track $index) {
                    <app-barralateral-menu [title]="option.title" 
                        [subItems]="option.children ?? []" 
                        [menuSection]="option"
                        (menuToggled)="toggleActiveMenu($event)"
                        [activeMenu]="activeMenu" 
                        [menuId]="option.title"/>
                }

                @if (menuItemsOther().length > 0) {
                    <div class="pt-6 border-t border-white/5 mt-6 mx-4">
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest px-0 mb-4 opacity-50">Otros</p>
                        <app-option-barralateral [menuItemsOther]="menuItemsOther()"/>
                    </div>
                }
            </nav>
        </div>

        <!-- Sidebar Footer/Logout Section -->
        <div class="p-4 bg-gray-900/50 border-t border-white/5">
            <div class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 cursor-pointer transition-all group">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center text-white text-xs font-bold ring-2 ring-blue-500/20 shadow-lg capitalize">
                  {{ currentUser()?.fullName?.charAt(0) || 'U' }}
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-bold text-white truncate">{{ currentUser()?.fullName }}</p>
                    <p class="text-[10px] text-gray-500 truncate">{{ currentUser()?.email }}</p>
                </div>
                <button class="opacity-0 group-hover:opacity-100 transition-opacity text-gray-500 hover:text-red-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>
        </div>
    </aside>

    <!-- Content Area -->
    <main class="transition-all duration-300 ease-in-out lg:ml-72 min-h-screen pt-0">
        <div class="max-w-[1600px] mx-auto p-4 md:p-8 lg:p-10 animate-fade-up">
            <router-outlet />
        </div>
    </main>
</div>

<style>
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    .animate-fade-up { animation: fadeUp 0.5s ease-out; }
    
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
</style>
