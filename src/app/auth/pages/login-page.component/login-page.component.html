<form class="space-y-6" [formGroup]="formLogin">
    <!-- Email Field -->
    <div class="space-y-2">
        <label for="email" class="block text-sm font-semibold text-slate-700">Correo Electrónico</label>
        <div class="relative">
            <input type="email" 
                name="email" 
                id="email" 
                formControlName="email"
                [class.border-red-500]="formLogin.get('email')?.touched && formLogin.get('email')?.errors"
                class="w-full px-5 py-3 bg-slate-50 border border-slate-200 text-slate-900 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none placeholder:text-slate-400" 
                placeholder="nombre@empresa.com">
        </div>
        <form-error-label [errorType]="formLogin.get('email')!" />
    </div>

    <!-- Password Field -->
    <div class="space-y-2">
        <div class="flex items-center justify-between">
            <label for="password" class="block text-sm font-semibold text-slate-700">Contraseña</label>
        </div>
        <div class="relative">
            <input type="password" 
                name="password" 
                id="password" 
                placeholder="••••••••" 
                formControlName="password"
                [class.border-red-500]="formLogin.get('password')?.touched && formLogin.get('password')?.errors"
                class="w-full px-5 py-3 bg-slate-50 border border-slate-200 text-slate-900 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none placeholder:text-slate-400">
        </div>
        <form-error-label [errorType]="formLogin.get('password')!" />
    </div>

    <!-- Actions section -->
    <div class="flex items-center justify-between">
        <label class="flex items-center cursor-pointer group">
            <div class="relative">
                <input id="remember" type="checkbox" class="sr-only peer">
                <div class="w-5 h-5 border-2 border-slate-200 rounded group-hover:border-blue-400 peer-checked:bg-blue-600 peer-checked:border-blue-600 transition-all duration-200 flex items-center justify-center">
                    <svg class="w-3 h-3 text-white opacity-0 peer-checked:opacity-100 transition-opacity duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4">
                        <path d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>
            <span class="ml-2 text-sm font-medium text-slate-500 group-hover:text-slate-700 transition-colors">Recuérdame</span>
        </label>
        <a href="#" class="text-sm font-bold text-blue-600 hover:text-blue-700 transition-colors">¿Olvidaste tu contraseña?</a>
    </div>
    
    <!-- Submit Button -->
    <button 
        type="submit" 
        (click)="onSubmit()"
        class="w-full py-3.5 px-5 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-bold rounded-xl shadow-lg shadow-blue-500/20 transform transition-all duration-200 hover:-translate-y-0.5 active:translate-y-0 active:shadow-inner focus:ring-2 focus:ring-blue-500/40 outline-none">
        Iniciar Sesión
    </button>

    <!-- Footer -->
    <p class="text-center text-sm font-medium text-slate-500">
        ¿Aún no tienes una cuenta? 
        <a routerLink="/auth/register" class="text-blue-600 font-bold hover:underline decoration-2 underline-offset-4">Regístrate</a>
    </p>
</form>
